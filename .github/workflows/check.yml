name: Cadastre Status Check

on:
  schedule:
    - cron: '13 * * * *'   # every hour, offset off :00 since GitHub throttles/drops top-of-hour cron runs
  workflow_dispatch:

concurrency:
  group: cadastre-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Run cadastre status check
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          NOTIFY_PHONE: ${{ secrets.NOTIFY_PHONE }}
        run: python check.py

      - name: Upload debug screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: debug/
          if-no-files-found: ignore
          retention-days: 3

      - name: Commit updated status
        if: always()
        run: |
          git config user.name "Cadastre Bot"
          git config user.email "cadastre-bot@noreply"
          git add docs/status.json
          git diff --staged --quiet && echo "No change" && exit 0
          git commit -m "status update"
          git pull --rebase origin main || (
            git checkout --theirs -- docs/status.json &&
            git add docs/status.json &&
            git rebase --continue
          )
          git push
